# Hold the Line 对战服 wss 反代 (docs/12 B0, nginx 版)。
# 目标:/etc/nginx/conf.d/htl.conf 。setup-tls.ps1 会 scp 到位并 reload,再由你手动 certbot 签证书。
# 这台 VPS 的 80/443 已被现有 nginx 占用(www/@/podecho 项目),所以走 nginx 反代而非独立 Caddy。
server {
    listen 80;
    listen [::]:80;
    server_name htl.cicala.chat;

    # WebSocket 对战流 → 本机 5210
    location /ws {
        proxy_pass http://127.0.0.1:5210;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 服务器 ForwardedHeaders 读它做按 IP 限流
        proxy_read_timeout 3600s;   # 回合制,连接常空闲,别用默认 60s 断链
        proxy_send_timeout 3600s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:5210;
    }
}
# 之后 `certbot --nginx -d htl.cicala.chat` 会自动往本 server 块加 443 SSL 与 80→443 跳转。
